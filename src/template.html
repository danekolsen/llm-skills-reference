<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skills Reference</title>
<style>__STYLES__</style>
</head>
<body>
<header>
	<h1>Skills Reference</h1>
	<div class="header-actions">
		<button id="themeToggle" class="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle light/dark theme">
			<span class="theme-toggle-track">
				<span class="theme-toggle-icon theme-toggle-icon-sun"></span>
				<span class="theme-toggle-icon theme-toggle-icon-moon"></span>
				<span class="theme-toggle-thumb"></span>
			</span>
		</button>
	</div>
</header>

<div class="toolbar">
	<div class="search-wrap">
		<span class="search-icon"></span>
		<input type="search" id="searchBox" aria-label="Filter skills" placeholder="Filter skills by name, description, or tag…" />
	</div>
	<button id="expandAll"><span class="btn-icon"></span>Expand all</button>
	<button id="collapseAll"><span class="btn-icon"></span>Collapse all</button>
	<div class="summary-counts" id="summaryCounts"></div>
</div>

<main id="app"></main>

<footer>Generated by skills-reference · see README.md for how to point this at your own skills</footer>

<script type="application/json" id="config-data">__CONFIG_JSON__</script>
<script type="application/json" id="skills-data">__DATA_JSON__</script>
<script>__APP_JS__</script>
</body>
</html>
